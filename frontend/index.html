<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Pretendard — index.css 에 @font-face 인라인. woff2 는 jsDelivr 에서 로드 -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <!-- 한국어 사용자가 많이 쓰는 글리프 subset preload (체인 단축) -->
    <link rel="preload" as="font" type="font/woff2" crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/packages/pretendard/dist/web/variable/woff2-dynamic-subset/PretendardVariable.subset.87.woff2">
    <link rel="preload" as="font" type="font/woff2" crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/packages/pretendard/dist/web/variable/woff2-dynamic-subset/PretendardVariable.subset.88.woff2">

    <!-- Noto Serif KR — 비차단 로딩 (한국어 serif 텍스트 폴백 방지) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap"></noscript>

    <!-- Cloudflare Images preconnect — LCP 단축 (포트폴리오 페이지 등) -->
    <link rel="preconnect" href="https://imagedelivery.net" crossorigin>

    <!-- LCP hint — 모바일 첫 화면 메인 스크린샷 -->
    <link rel="preload" as="image" href="/screenshots/screenshot-main-mobile_en.webp" media="(max-width: 768px)">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Racconto — Photo Storytelling & Portfolio</title>

    <!-- SEO 기본 메타태그 -->
    <meta name="description" content="Organize your photos into chapters, build a public portfolio, and share your story. Free for photographers — no Lightroom required." />
    <meta name="keywords" content="photo portfolio, photography, film photography, photo storytelling, portfolio builder" />
    <meta name="author" content="Dawoon Choi" />
    <link rel="canonical" href="https://racconto.app" />

    <!-- Open Graph (포트폴리오 페이지는 backend /og 라우터가 동적 주입) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://racconto.app" />
    <meta property="og:title" content="Racconto — Photo Storytelling & Portfolio" />
    <meta property="og:description" content="Organize your photos into chapters, build a public portfolio, and share your story. Free for photographers." />
    <meta property="og:image" content="https://racconto.app/screenshots/screenshot-main-mobile_en.webp" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="ko_KR" />
    <meta property="og:locale:alternate" content="ja_JP" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Racconto — Photo Storytelling & Portfolio" />
    <meta name="twitter:description" content="Organize your photos into chapters, build a public portfolio, and share your story." />
    <meta name="twitter:image" content="https://racconto.app/screenshots/screenshot-main-mobile_en.webp" />
  </head>
  <body>
    <!-- 텍스트 크기 설정을 렌더 전에 적용 (flash 방지) -->
    <script>
      (function() {
        var s = localStorage.getItem('font_scale') || 'md';
        var map = { sm: '14px', md: '16px', lg: '18px' };
        document.documentElement.style.fontSize = map[s] || '16px';
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
