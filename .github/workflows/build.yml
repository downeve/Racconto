name: Build Racconto

on:
  push:
    tags:
      - 'v*'          # v1.0.0 같은 태그를 push할 때 실행

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: ELECTRON_BUILD=1 npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_ENABLE_DELIVERY: ${{ secrets.VITE_ENABLE_DELIVERY }}
          VITE_DISCORD_WEB_HOOK_URL: ${{ secrets.VITE_DISCORD_WEB_HOOK_URL }}

      - name: Install electron deps
        working-directory: electron
        run: npm ci

      - name: Install Apple Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.CSC_LINK }}
          P12_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          KEYCHAIN_PASSWORD: "temporary-password"
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode > $CERTIFICATE_PATH  # ✅ 수정

          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security list-keychains -d user -s $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH  # ✅ 추가

      - name: Package (mac)
        working-directory: electron
        run: npx electron-builder --mac
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DEBUG: electron-osx-sign* # 문제가 생길 경우 원인 파악을 위한 상세 로그 출력

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: racconto-mac
          path: electron/dist/*.dmg
          retention-days: 7

  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build          # Windows runner는 env로 주입
        env:
          ELECTRON_BUILD: 1
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_ENABLE_DELIVERY: ${{ secrets.VITE_ENABLE_DELIVERY }}
          VITE_DISCORD_WEB_HOOK_URL: ${{ secrets.VITE_DISCORD_WEB_HOOK_URL }}

      - name: Install electron deps
        working-directory: electron
        run: npm ci

      - name: Package (win)
        working-directory: electron
        run: npx electron-builder --win

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: racconto-win
          path: electron/dist/*.exe
          retention-days: 7

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-all/**
          generate_release_notes: true