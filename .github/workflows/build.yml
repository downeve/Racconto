name: Build Racconto

on:
  push:
    tags:
      - 'v*'          # v1.0.0 같은 태그를 push할 때 실행

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: ELECTRON_BUILD=1 npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_ENABLE_DELIVERY: ${{ secrets.VITE_ENABLE_DELIVERY }}
          VITE_DISCORD_WEB_HOOK_URL: ${{ secrets.VITE_DISCORD_WEB_HOOK_URL }}

      - name: Install electron deps
        working-directory: electron
        run: npm ci

      # ✅ 추가된 부분: Mac 시스템 키체인에 애플 인증서를 안전하게 미리 설치합니다.
      - name: Install Apple Certificate
        uses: apple-actions/import-codesigning-certs@v1
        with:
          p12-file-base64: ${{ secrets.CSC_LINK }}
          p12-password: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Package (mac)
        working-directory: electron
        run: npx electron-builder --mac
        env:
          # ✅ 변경된 부분: CSC_LINK 관련 변수는 위에서 처리했으므로 제거합니다.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DEBUG: electron-osx-sign* # 만약 또 멈추면 원인을 파악하기 위해 상세 로그를 출력합니다.

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: racconto-mac
          path: electron/dist/*.dmg
          retention-days: 7

  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build          # Windows runner는 env로 주입
        env:
          ELECTRON_BUILD: 1
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_ENABLE_DELIVERY: ${{ secrets.VITE_ENABLE_DELIVERY }}
          VITE_DISCORD_WEB_HOOK_URL: ${{ secrets.VITE_DISCORD_WEB_HOOK_URL }}

      - name: Install electron deps
        working-directory: electron
        run: npm ci

      - name: Package (win)
        working-directory: electron
        run: npx electron-builder --win

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: racconto-win
          path: electron/dist/*.exe
          retention-days: 7

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-all/**
          generate_release_notes: true