services:
  db:
    image: postgres:15
    container_name: racconto_db
    restart: always
    env_file:
      - backend/.env
    volumes:
      - /var/lib/postgresql/data_racconto:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    command: >
      postgres
      -c max_connections=50
      -c shared_buffers=128MB
      -c work_mem=4MB
      -c effective_cache_size=512MB
